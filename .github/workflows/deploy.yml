name: BoyJack OS — Build & Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: boyjack-os
  REGISTRY: ghcr.io
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/boyjack-os

  # ── NixOS package list (all packages, 512 GB free disk) ──────────────────
  NIX_PACKAGES: >-
    novnc tigervnc fluxbox firefox gedit pcmanfm
    feh xterm xorg.xinit xorg.xauth xorg.xsetroot
    python3 xdotool wish curl wget git

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & push Docker image
  # Base image : nixos/nix:latest  (lightweight, all-in-one)
  # Packages   : $NIX_PACKAGES
  # Disk       : 512 GB free (GitHub-hosted large runner or self-hosted)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image (nixos/nix:latest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag:    ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space (up to 512 GB target)
        run: |
          echo "=== Disk before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache \
                      /usr/local/lib/android /usr/local/share/boost 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          echo "=== Disk after cleanup ==="
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Print image digest
        run: echo "Pushed ${{ env.REGISTRY_IMAGE }}@${{ steps.build-push.outputs.digest }}"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Health-check smoke test (no timeout — polls until ready)
  # Checks port 5000 (noVNC web) first, then falls back to port 5901 (VNC).
  # ─────────────────────────────────────────────────────────────────────────
  healthcheck:
    name: Health Check — Auto-detect (no timeout)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built image
        run: docker pull ${{ env.REGISTRY_IMAGE }}:latest

      - name: Start container (ports 5000 + 5901)
        run: |
          docker run -d \
            --name boyjack-test \
            -p 5000:5000 \
            -p 5901:5901 \
            -e DISPLAY=:1 \
            -e HOME=/app \
            ${{ env.REGISTRY_IMAGE }}:latest

      - name: Verify VNC port 5901 is open
        run: |
          echo "Checking VNC port 5901..."
          attempt=0
          while true; do
            attempt=$((attempt + 1))
            if nc -z localhost 5901 2>/dev/null; then
              echo "VNC port 5901 is open after $attempt attempts."
              break
            fi
            echo "  [attempt $attempt] VNC port not yet open, retrying..."
            sleep 3
          done

      - name: Dump container logs on failure
        if: failure()
        run: docker logs boyjack-test

      - name: Stop and remove test container
        if: always()
        run: docker rm -f boyjack-test || true

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3a — Deploy to remote server via SSH key-based authentication
  #
  # How to generate the key pair (run locally):
  #   ssh-keygen -t ed25519 -C "github-actions-boyjack" -f boyjack_deploy
  #   # → private key: boyjack_deploy
  #   # → public  key: boyjack_deploy.pub
  #   cat boyjack_deploy.pub >> ~/.ssh/authorized_keys   # on the server
  #
  # GitHub Secrets required (Settings → Secrets → Actions):
  #   SERVER_HOST     — IP address or hostname of the target server
  #   SERVER_USER     — SSH login username  (e.g. root, ubuntu, deploy)
  #   SERVER_SSH_KEY  — contents of the private key file (boyjack_deploy)
  #   SERVER_SSH_PUB  — contents of the public  key file (boyjack_deploy.pub)
  #
  # Optional secret:
  #   SERVER_PORT     — SSH port (defaults to 22)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-ssh:
    name: Deploy to Server (SSH key-based auth)
    runs-on: ubuntu-latest
    needs: [build, healthcheck]
    environment: production

    env:
      SSH_HOST: ${{ secrets.SERVER_HOST }}
      SSH_USER: ${{ secrets.SERVER_USER }}
      SSH_PORT: ${{ secrets.SERVER_PORT || '22' }}

    steps:
      # ── 1. Write private key & configure SSH client ──────────────────────
      - name: Set up SSH key-based authentication
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key (Ed25519 or RSA — any format accepted)
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/boyjack_deploy
          chmod 600 ~/.ssh/boyjack_deploy

          # Write public key (optional but good practice)
          if [ -n "${{ secrets.SERVER_SSH_PUB }}" ]; then
            printf '%s\n' "${{ secrets.SERVER_SSH_PUB }}" > ~/.ssh/boyjack_deploy.pub
            chmod 644 ~/.ssh/boyjack_deploy.pub
          fi

          # Scan and trust the server's host key (replaces manual known_hosts)
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

          # SSH client config: use only our deploy key, no password fallback
          # Using printf to avoid << YAML merge-key conflicts
          printf 'Host boyjack-server\n  HostName %s\n  User %s\n  Port %s\n  IdentityFile ~/.ssh/boyjack_deploy\n  IdentitiesOnly yes\n  StrictHostKeyChecking yes\n  PasswordAuthentication no\n  ServerAliveInterval 30\n  ServerAliveCountMax 0\n' \
            "$SSH_HOST" "$SSH_USER" "$SSH_PORT" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      # ── 2. Verify the key is accepted before deploying ───────────────────
      - name: Verify SSH key authentication
        run: |
          ssh boyjack-server "echo 'SSH key auth OK — connected as $(whoami) on $(hostname)'"

      # ── 3. Rolling deploy via SSH ─────────────────────────────────────────
      # Script is passed via env var → piped into ssh bash -s
      # This avoids any << YAML merge-key conflicts inside run: blocks.
      - name: Deploy BoyJack OS
        env:
          REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
          ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_SCRIPT: |
            set -e
            echo "=== BoyJack OS — Rolling Deploy ==="
            echo "    Base  : nixos/nix:latest"
            echo "    Image : ${REGISTRY_IMAGE}:latest"
            echo "    Web   : 5000 | VNC : 5901"

            echo "${GH_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

            docker pull "${REGISTRY_IMAGE}:latest"

            docker stop boyjack-os 2>/dev/null || true
            docker rm   boyjack-os 2>/dev/null || true

            docker run -d \
              --name boyjack-os \
              --restart unless-stopped \
              -p 5000:5000 \
              -p 5901:5901 \
              -e DISPLAY=:1 \
              -e HOME=/app \
              --health-cmd      "curl -f http://localhost:5000/vnc.html || nc -z localhost 5901" \
              --health-interval 15s \
              --health-retries  0 \
              --health-start-period 0s \
              "${REGISTRY_IMAGE}:latest"

            echo "=== Waiting for container to become healthy (no timeout) ==="
            while true; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' boyjack-os 2>/dev/null || echo "unknown")
              echo "  Health status: ${STATUS}"
              if [ "${STATUS}" = "healthy" ]; then
                echo "Container is healthy!"
                break
              elif [ "${STATUS}" = "unhealthy" ]; then
                docker logs --tail 50 boyjack-os
                echo "Container reported unhealthy."
                exit 1
              fi
              sleep 5
            done

            echo "=== Deploy complete ==="
            docker ps --filter name=boyjack-os
            docker image prune -f
        run: |
          printf '%s' "$DEPLOY_SCRIPT" | \
            ssh boyjack-server \
              REGISTRY_IMAGE="$REGISTRY_IMAGE" \
              ACTOR="$ACTOR" \
              GH_TOKEN="$GH_TOKEN" \
              bash -s

      # ── 4. Clean up private key from runner ──────────────────────────────
      - name: Remove SSH private key from runner
        if: always()
        run: rm -f ~/.ssh/boyjack_deploy ~/.ssh/boyjack_deploy.pub ~/.ssh/config

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Summary notification (always runs)
  # ─────────────────────────────────────────────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-ssh]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║        BoyJack OS — Deployment Summary       ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Base image : nixos/nix:latest               ║"
          echo "║  Disk       : 512 GB free                    ║"
          echo "║  Branch     : ${{ github.ref_name }}"
          echo "║  Commit     : ${{ github.sha }}"
          echo "║  Image      : ${{ env.REGISTRY_IMAGE }}:latest"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Packages installed via nix-shell:           ║"
          echo "║    novnc  tigervnc  fluxbox  firefox         ║"
          echo "║    gedit  pcmanfm  feh  xterm  python3       ║"
          echo "║    xdotool  wish  curl  wget  git            ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Ports                                       ║"
          echo "║    5000 → noVNC web interface                ║"
          echo "║    5901 → TigerVNC server                    ║"
          echo "║  Health check : auto-detect, no timeout      ║"
          echo "╚══════════════════════════════════════════════╝"
