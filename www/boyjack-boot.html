<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoyJack OS — Boot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00f5ff;
      --blue: #0066ff;
      --purple: #8b00ff;
      --dark: #000408;
      --mid: #010d1a;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      font-family: 'Courier New', monospace;
      overflow: hidden;
      color: #fff;
      cursor: none;
    }

    /* ── STARFIELD ── */
    #stars {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(0,102,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(139,0,255,0.08) 0%, transparent 60%);
    }
    #stars canvas { position: absolute; inset: 0; }

    /* ── SCANLINES ── */
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 100;
      animation: flicker 8s infinite;
    }
    @keyframes flicker {
      0%,100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.85; }
      94% { opacity: 1; }
      97% { opacity: 0.9; }
      98% { opacity: 1; }
    }

    /* ── MAIN WRAPPER ── */
    #boot {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      gap: 0;
    }

    /* ── LOGO ── */
    .logo-wrap {
      position: relative;
      animation: logoIn 1.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.6) translateY(-40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .logo-glow-ring {
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,245,255,0.18) 0%, transparent 70%);
      animation: pulseRing 3s ease-in-out infinite;
    }
    @keyframes pulseRing {
      0%,100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .logo-hex {
      width: 160px; height: 160px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-hex svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      animation: spinHex 20s linear infinite;
    }
    @keyframes spinHex {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .logo-hex svg.reverse {
      animation: spinHex 14s linear infinite reverse;
    }

    .logo-icon {
      font-size: 62px;
      line-height: 1;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 0 18px var(--cyan));
      animation: iconPulse 2s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%,100% { filter: drop-shadow(0 0 12px var(--cyan)); }
      50% { filter: drop-shadow(0 0 32px var(--cyan)) drop-shadow(0 0 60px var(--blue)); }
    }

    /* ── OS NAME ── */
    .os-name {
      margin-top: 28px;
      text-align: center;
      animation: fadeUp 1s 0.4s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .os-title {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 0%, var(--cyan) 40%, var(--blue) 70%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,245,255,0.5));
      font-family: 'Courier New', monospace;
    }

    .os-subtitle {
      font-size: 13px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(0,245,255,0.6);
      margin-top: 6px;
    }

    /* ── VERSION BADGE ── */
    .version-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 3px 14px;
      border: 1px solid rgba(0,245,255,0.3);
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: rgba(0,245,255,0.5);
      background: rgba(0,245,255,0.05);
    }

    /* ── DIVIDER ── */
    .divider {
      width: 360px;
      height: 1px;
      margin: 36px auto 0;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--blue), transparent);
      position: relative;
      animation: fadeUp 1s 0.6s both;
    }
    .divider::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      width: 6px; height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--cyan);
    }

    /* ── PROGRESS SECTION ── */
    .progress-section {
      margin-top: 48px;
      width: 340px;
      animation: fadeUp 1s 0.8s both;
    }

    .status-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .status-text {
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(0,245,255,0.7);
    }
    .status-pct {
      font-size: 12px;
      color: var(--cyan);
      font-weight: bold;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      border-radius: 2px;
      box-shadow: 0 0 12px var(--cyan);
      transition: width 0.3s ease;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0;
      width: 40px; height: 100%;
      background: rgba(255,255,255,0.4);
      filter: blur(4px);
    }

    /* ── BOOT LOG ── */
    .boot-log {
      margin-top: 28px;
      width: 340px;
      height: 100px;
      overflow: hidden;
      position: relative;
      animation: fadeUp 1s 1s both;
    }
    .boot-log::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 30px;
      background: linear-gradient(to bottom, var(--dark), transparent);
      z-index: 2;
    }
    .boot-log-inner {
      position: absolute;
      bottom: 0; left: 0; right: 0;
    }

    .log-line {
      font-size: 10px;
      line-height: 1.7;
      padding: 0 2px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .log-line.show {
      opacity: 1;
      transform: translateY(0);
    }
    .log-ok   { color: rgba(0,255,136,0.8); }
    .log-info { color: rgba(0,245,255,0.6); }
    .log-warn { color: rgba(255,200,0,0.7); }

    /* ── DOTS LOADER ── */
    .dots-row {
      margin-top: 32px;
      display: flex; gap: 10px;
      animation: fadeUp 1s 1.1s both;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: dotBounce 1.4s ease-in-out infinite;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    .dot:nth-child(4) { animation-delay: 0.54s; }
    .dot:nth-child(5) { animation-delay: 0.72s; }
    @keyframes dotBounce {
      0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.3); opacity: 1; }
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: rgba(0,4,8,0.8);
      border-top: 1px solid rgba(0,245,255,0.1);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(0,245,255,0.35);
      z-index: 20;
      animation: fadeUp 1s 1.2s both;
    }

    /* ── CORNER MARKS ── */
    .corner {
      position: fixed;
      width: 24px; height: 24px;
      border-color: rgba(0,245,255,0.3);
      border-style: solid;
      z-index: 20;
      animation: fadeUp 1s 0.2s both;
    }
    .corner-tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 52px; left: 16px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 52px; right: 16px; border-width: 0 2px 2px 0; }

    /* ── FINAL FLASH ── */
    #flash {
      position: fixed; inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

<div id="stars"><canvas id="starCanvas"></canvas></div>
<div class="scanlines"></div>

<!-- Corner marks -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div id="boot">

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-glow-ring"></div>
    <div class="logo-hex">

      <!-- Outer ring -->
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <polygon points="80,8 148,44 148,116 80,152 12,116 12,44"
          fill="none" stroke="rgba(0,245,255,0.25)" stroke-width="1.5"
          stroke-dasharray="8 4"/>
        <polygon points="80,18 138,50 138,110 80,142 22,110 22,50"
          fill="none" stroke="rgba(0,102,255,0.4)" stroke-width="1"/>
      </svg>

      <!-- Inner ring (reverse) -->
      <svg class="reverse" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <circle cx="80" cy="80" r="55"
          fill="none" stroke="rgba(0,245,255,0.15)" stroke-width="1"
          stroke-dasharray="4 8"/>
        <circle cx="80" cy="80" r="45"
          fill="none" stroke="rgba(139,0,255,0.3)" stroke-width="0.8"
          stroke-dasharray="10 5"/>
      </svg>

      <div class="logo-icon">🤖</div>
    </div>
  </div>

  <!-- OS NAME -->
  <div class="os-name">
    <div class="os-title">BoyJack OS</div>
    <div class="os-subtitle">Intelligent System Core</div>
    <div class="version-badge">v1.0.0 &nbsp;·&nbsp; BUILD 2026.03.12</div>
  </div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="status-line">
      <span class="status-text" id="statusText">INITIALIZING KERNEL...</span>
      <span class="status-pct" id="statusPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- BOOT LOG -->
  <div class="boot-log">
    <div class="boot-log-inner" id="logInner"></div>
  </div>

  <!-- DOTS -->
  <div class="dots-row">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <span>BOYJACK OS &copy; 2026</span>
  <span id="clock">--:--:--</span>
  <span>SECURE BOOT &nbsp;✔</span>
</div>

<!-- FLASH -->
<div id="flash"></div>

<script>
/* ── STARFIELD ── */
(function() {
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 180; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.004,
      speed: Math.random() * 0.00015 + 0.00005
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.y -= s.speed;
      if (s.y < 0) { s.y = 1; s.x = Math.random(); }
      s.a = Math.max(0.1, Math.min(1, s.a + s.da));
      if (s.a <= 0.1 || s.a >= 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,220,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();
})();

/* ── CLOCK ── */
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toTimeString().slice(0,8);
}
updateClock();
setInterval(updateClock, 1000);

/* ── BOOT SEQUENCE ── */
const steps = [
  { pct: 5,  label: 'LOADING BIOS...',              log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">UEFI Firmware v2.4 verified</span>'] },
  { pct: 12, label: 'INITIALIZING KERNEL...',        log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">Kernel ring buffer ready</span>'] },
  { pct: 20, label: 'LOADING CORE MODULES...',       log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">module: bjcore.sys loaded</span>',
                                                            '<span class="log-ok">[  OK  ]</span> <span class="log-info">module: bjnet.sys loaded</span>'] },
  { pct: 31, label: 'MOUNTING FILESYSTEMS...',       log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">ext4 /dev/sda1 → /</span>',
                                                            '<span class="log-ok">[  OK  ]</span> <span class="log-info">tmpfs mounted</span>'] },
  { pct: 42, label: 'STARTING NETWORK STACK...',     log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">eth0 :: 10.0.0.1 online</span>'] },
  { pct: 54, label: 'INITIALIZING AI CORE...',       log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">BoyJack AI Engine v3.2 started</span>',
                                                            '<span class="log-warn">[ WARN ]</span> <span class="log-info">Neural cache warmed — 4.2 GB</span>'] },
  { pct: 65, label: 'LOADING USER ENVIRONMENT...',   log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">Session manager ready</span>'] },
  { pct: 76, label: 'APPLYING SECURITY POLICY...',   log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">Secure Enclave locked</span>',
                                                            '<span class="log-ok">[  OK  ]</span> <span class="log-info">Firewall rules applied (64 rules)</span>'] },
  { pct: 87, label: 'STARTING DISPLAY SERVER...',    log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">GPU: BJ-Render 1080p @ 144Hz</span>'] },
  { pct: 95, label: 'FINALIZING BOOT...',            log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">All daemons started (31/31)</span>'] },
  { pct: 100, label: 'BOOT COMPLETE — WELCOME.',     log: ['<span class="log-ok">[  OK  ]</span> <span class="log-info">BoyJack OS is ready.</span>'] },
];

const fill     = document.getElementById('progressFill');
const statusTx = document.getElementById('statusText');
const statusPc = document.getElementById('statusPct');
const logInner = document.getElementById('logInner');
const flash    = document.getElementById('flash');

let stepIdx = 0;
const LOG_MAX = 6;
let logLines = [];

function addLog(html) {
  const div = document.createElement('div');
  div.className = 'log-line';
  div.innerHTML = html;
  logInner.appendChild(div);
  logLines.push(div);
  if (logLines.length > LOG_MAX) {
    const old = logLines.shift();
    old.style.opacity = '0';
    setTimeout(() => old.remove(), 300);
  }
  requestAnimationFrame(() => div.classList.add('show'));
}

function runStep() {
  if (stepIdx >= steps.length) return;
  const s = steps[stepIdx++];

  fill.style.width = s.pct + '%';
  statusTx.textContent = s.label;
  statusPc.textContent = s.pct + '%';

  s.log.forEach((l, i) => setTimeout(() => addLog(l), i * 220));

  if (s.pct < 100) {
    const delay = 600 + Math.random() * 500;
    setTimeout(runStep, delay);
  } else {
    // Boot complete — show launch message, then white-flash into VNC
    setTimeout(() => {
      addLog('<span class="log-ok">[  OK  ]</span> <span class="log-info">Launching desktop session...</span>');
      statusTx.textContent = 'LAUNCHING DESKTOP...';
    }, 400);

    setTimeout(() => {
      flash.style.transition = 'opacity 0.5s ease';
      flash.style.opacity = '1';
    }, 1800);

    setTimeout(() => {
      // Navigate to vnc.html with autoconnect
      window.location.replace('/vnc.html?autoconnect=true&reconnect=true&resize=scale');
    }, 2350);
  }
}

// Kick off after logo animation
setTimeout(runStep, 1400);
</script>
</body>
</html>
